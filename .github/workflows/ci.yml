name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile
        run: python3 -m py_compile cc-sessions

      - name: Unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Non-interactive commands work (against demo data)
        run: |
          python3 demo/make_demo_data.py
          export HOME="$PWD/demo/home"
          python3 cc-sessions config
          python3 cc-sessions status "PAY-204/1"
          python3 cc-sessions hop "PAY-204/1.002: Refactor checkout flow" --dry-run
